# Integration 10 — four-service stack.
#
# (Infra-Integration lead): author this file.
#
# Required services: api, web, neo4j, weaviate.
#
# Per the Evaluation Methodology in integration-task-spec.md:

services:
  # - neo4j: image neo4j:5-community; NEO4J_dbms_memory_heap_max__size=1G,
  #          NEO4J_dbms_memory_pagecache_size=512M; named volume neo4j_data
  #          mounted at /data; healthcheck via cypher-shell.
  # - Every service declares a healthcheck.
  neo4j:
    image: neo4j:5-community
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_AUTH=${NEO4J_AUTH}
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # - weaviate: image semitechnologies/weaviate:1.24.10; named volume
  #             weaviate_data mounted at /var/lib/weaviate;
  #             DEFAULT_VECTORIZER_MODULE=none; healthcheck via
  #             /v1/.well-known/ready.
  # - Every service declares a healthcheck.
  weaviate:
    image: semitechnologies/weaviate:1.24.10
    ports:
      - "8080:8080"
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      - QUERY_DEFAULTS_LIMIT=20
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # - api build: long-form `context: .` + `dockerfile: api/Dockerfile`
  #   (NOT `build: ./api` — see reading Section 11; api container runs
  #   `uvicorn api.main:app` and needs repo-root context so package-
  #   relative imports resolve).
  # - api env: NEO4J_URI=bolt://neo4j:7687, WEAVIATE_URL=http://weaviate:8080,
  #           WEB_ORIGIN=${WEB_ORIGIN}.
  # - `api.depends_on` includes both `neo4j` and `weaviate` with
  #   `condition: service_healthy`.
  # - Every service declares a healthcheck.
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - WEAVIATE_URL=http://weaviate:8080
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - WEB_ORIGIN=${WEB_ORIGIN}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz').getcode() == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 240s

  # - web NEXT_PUBLIC_API_URL=http://localhost:8000 must be a BUILD ARG
  #   (under `services.web.build.args`), not a runtime `environment:` entry.
  #   Next.js bakes NEXT_PUBLIC_* into the client bundle at build time; a
  #   runtime env var runs in the container but never reaches the browser.
  # - `web.depends_on` includes `api` with `condition: service_healthy`.
  # - Every service declares a healthcheck.
  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

# - volumes block declares named neo4j_data and weaviate_data.
volumes:
  neo4j_data:
  weaviate_data: